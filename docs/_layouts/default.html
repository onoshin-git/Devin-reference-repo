<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script type="module">
      import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
      mermaid.initialize({ startOnLoad: true, theme: "default" });
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <p class="site-description">{{ site.description }}</p>
      </div>
    </header>
    <main class="container content">
      <aside class="site-nav">
        <p class="site-nav__title">ドキュメント</p>
        <ul>
          <li><a href="{{ '/' | relative_url }}">トップ</a></li>
          <li><a href="{{ '/START_HERE.html' | relative_url }}">開始ガイド</a></li>
          <li><a href="{{ '/READ_ORDER.html' | relative_url }}">読込順</a></li>
          <li><a href="{{ '/REFERENCE_POLICY.html' | relative_url }}">参照ポリシー</a></li>
        </ul>
      </aside>
      <article class="site-article">
        {{ content }}
      </article>
    </main>
  </body>
</html>
